apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
  minReplicas: 2
  maxReplicas: 12
  behavior:
    scaleUp:
      policies:
      - type: Pods
        value: 3
        periodSeconds: 60
      stabilizationWindowSeconds: 60
    scaleDown:
      policies:
      - type: Pods
        value: 3
        periodSeconds: 60
      stabilizationWindowSeconds: 60
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50